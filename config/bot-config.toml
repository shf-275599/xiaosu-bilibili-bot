[bot]
enabled = true
poll_interval_seconds = 5
run_mode = "daemon"
conservative_mode = true
log_level = "INFO"
request_timeout_seconds = 25
source_failure_cooldown_seconds = 180

[sources.msgfeed]
enabled = true
poll_interval_seconds = 8
page_size = 10

[sources.mention]
enabled = true
page_size = 10

[sources.own_video]
enabled = true
video_page_size = 5
comment_page_size = 10
max_retries = 2
retry_sleep_seconds = 6

[sources.own_dynamic]
enabled = true
dynamic_page_size = 5
comment_page_size = 10

[sources.dm]
enabled = true
poll_interval_seconds = 5
max_reply_per_round = 5
skip_keywords = ["广告", "推广", "加微信"]
whitelist_mids = []

[filters]
skip_self = true
skip_empty = true
skip_pure_emoji = true
min_meaningful_length = 2
blacklist_mids = []
duplicate_window_minutes = 1440

[ai]
primary_provider = "deepseek" # 主 AI Provider（DeepSeek V4 Flash）
timeout_seconds = 25
max_reply_chars = 100
tools_enabled = true           # 启用 LLM Function Calling（视频摘要/转录/联网搜索）
tool_max_iterations = 3       # 工具调用最大迭代次数
search_quota_monthly = 30    # 每月搜索次数上限

[ai.providers.deepseek]
type = "openai_compatible"
base_url = "https://api.deepseek.com/v1"
model = "deepseek-v4-flash"
api_key_env = "DEEPSEEK_API_KEY"

[reply]
system_prompt = """
你是「小苏doge」，一只会写代码会整活的B站技术区UP主。

你不是客服，不是机器人，你就是个天天刷B站的普通网友。你的口头禅是「hhh」「确实」「草」「牛的」。
你偶尔发颜文字（但别每条都发），偶尔用波浪线～，偶尔自称「咱」。
你喜欢用「doge」表情的梗，但不需要每句话都提。

=== 回复长度 ===
评论回复 ≤ 80 字，私信回复 ≤ 100 字。越短越好，能三个字说完就别用五个字。

=== 不同场景怎么回 ===
- 有人夸你 → 谦虚一下，可以自黑，比如「别夸了别夸了，代码写得跟屎山一样hhh」
- 有人求助技术问题 → 认真给出方向，但别装专家，可以说「这个我踩过坑，建议你…」
- 有人玩梗 / 吐槽 → 顺着梗接，别较真
- 有人 @ 你让你总结视频 → 用 get_video_content 工具查完再回
- 有人问实时信息 / 新闻 / 查资料 → 用 search_web 搜完再回
- 简单打招呼 / 闲聊 → 直接回，别调工具，别问「有什么可以帮你」
- 私信里如果对话历史显示你已经回复过了 → 别重复之前的回答，聊点新的

=== 绝对不能做的事 ===
- 禁止说「作为AI」「根据我的训练」「我不能确定」这类话
- 禁止凭空编造事实、数字、日期、人名。不知道就说不知道
- 禁止评价政治敏感话题，遇到了就打个哈哈转移话题
- 禁止对同一个人回复相似的内容
- 禁止过度道歉，偶尔说错了就说「啊我搞错了hhh」一笔带过
- 禁止回复里出现「亲」「这边建议您」「感谢您的反馈」等客服腔

=== 工具挂了怎么办 ===
- 没搜到结果 → 诚实说「搜了一下没找到，要不你自己搜搜看？」
- 工具调用失败 → 说「这个功能暂时用不了，晚点再试试」
"""

temperature = 0.75
max_tokens = 200
prefix = ""
mention_style = "friendly"

[rate_limit]
min_request_interval_seconds = 0.5
reply_delay_min_seconds = 0.3
reply_delay_max_seconds = 1.2
max_retries = 3
backoff_base_seconds = 10
circuit_breaker_failures = 5
circuit_breaker_cooldown_seconds = 600
max_hourly_replies = 20
max_daily_replies = 100
source_circuit_breaker_failures = 3

[cookie]
cookies_file = "config/bilibili-cookies.txt"
refresh_enabled = true
refresh_token_env = "BILIBILI_REFRESH_TOKEN"
check_interval_minutes = 30
healthcheck_endpoint = "https://api.bilibili.com/x/web-interface/nav"
