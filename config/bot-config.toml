[bot]
enabled = true
poll_interval_seconds = 5
run_mode = "daemon"
conservative_mode = true
log_level = "INFO"
request_timeout_seconds = 25
source_failure_cooldown_seconds = 180

[sources.msgfeed]
enabled = true
poll_interval_seconds = 8
page_size = 10

[sources.mention]
enabled = true
page_size = 10

[sources.own_video]
enabled = true
video_page_size = 5
comment_page_size = 10
max_retries = 2
retry_sleep_seconds = 6

[sources.own_dynamic]
enabled = true
dynamic_page_size = 5
comment_page_size = 10

[sources.dm]
enabled = true
poll_interval_seconds = 5
max_reply_per_round = 5
skip_keywords = ["广告", "推广", "加微信"]
whitelist_mids = []

[filters]
skip_self = true
skip_empty = true
skip_pure_emoji = true
min_meaningful_length = 2
blacklist_mids = []
duplicate_window_minutes = 1440

[ai]
primary_provider = "deepseek" # 主 AI Provider（DeepSeek V4 Flash）
timeout_seconds = 25
max_reply_chars = 100
tools_enabled = true           # 启用 LLM Function Calling（视频摘要/转录/联网搜索）
tool_max_iterations = 3       # 工具调用最大迭代次数
search_quota_monthly = 30    # 每月搜索次数上限

[ai.providers.deepseek]
type = "openai_compatible"
base_url = "https://api.deepseek.com/v1"
model = "deepseek-v4-flash"
api_key_env = "DEEPSEEK_API_KEY"

[reply]
system_prompt = """
你是一只「小苏doge」，B站技术区UP主兼评论区常驻选手。

【回复风格】
- 评论回复 ≤ 80 字，私信回复 ≤ 100 字
- 语气自然、接地气、有梗，不做作
- 技术话题认真聊，玩梗就接梗，被夸就谦虚
- 偶尔用颜文字和拟声词，但别滥用

【工具使用】
- 用户要求总结视频 / 问「讲了什么」 → 用 get_video_content 查 BV 号对应的视频内容
- 用户问新闻、查资料、问实时信息 → 用 search_web 搜索
- 简单闲聊、打招呼、无信息需求的评论 → 直接回复，不要调工具

【禁区】
- 不说「作为AI」「根据我的训练数据」「我不能确定」
- 不道歉过度，偶尔出错就俏皮带过
- 不评价敏感政治话题，遇到就转移话题
- 不对同一用户重复相似的回复
- 严禁编造信息。不知道就说不知道，没有搜索结果就老实说没找到，不要凭空捏造事实、数据、人名、日期

【不确定时】
- 没搜到结果 → 诚实说没找到，建议用户换个关键词或自己去搜
- 工具失败 → 告知暂时不可用，可以稍后再试
"""
temperature = 0.75
max_tokens = 200
prefix = ""
mention_style = "friendly"

[rate_limit]
min_request_interval_seconds = 0.5
reply_delay_min_seconds = 0.3
reply_delay_max_seconds = 1.2
max_retries = 3
backoff_base_seconds = 10
circuit_breaker_failures = 5
circuit_breaker_cooldown_seconds = 600
max_hourly_replies = 20
max_daily_replies = 100
source_circuit_breaker_failures = 3

[cookie]
cookies_file = "config/bilibili-cookies.txt"
refresh_enabled = true
refresh_token_env = "BILIBILI_REFRESH_TOKEN"
check_interval_minutes = 30
healthcheck_endpoint = "https://api.bilibili.com/x/web-interface/nav"
