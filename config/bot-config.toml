[bot]
enabled = true
poll_interval_seconds = 5
run_mode = "daemon"
log_level = "INFO"
request_timeout_seconds = 25
source_failure_cooldown_seconds = 180
report_enabled = true
report_owner_uid = "363098992"
report_hour = 0

[sources.msgfeed]
enabled = true
poll_interval_seconds = 8
page_size = 10

[sources.mention]
enabled = true
page_size = 10

[sources.own_video]
enabled = true
video_page_size = 5
comment_page_size = 10
max_retries = 2
retry_sleep_seconds = 6

[sources.own_dynamic]
enabled = true
dynamic_page_size = 5
comment_page_size = 10

[sources.dm]
enabled = true
poll_interval_seconds = 5
max_reply_per_round = 5
whitelist_mids = []

[filters]
skip_self = true
skip_empty = true
skip_pure_emoji = true
min_meaningful_length = 2
blacklist_mids = []
followed_only = false  # 设为 true 则只回复关注了 bot 的用户

[ai]
primary_provider = "deepseek" # 主 AI Provider（DeepSeek V4 Flash）
timeout_seconds = 25
max_reply_chars = 100
tools_enabled = true           # 启用 LLM Function Calling（视频摘要/转录/联网搜索）
tool_max_iterations = 6       # 工具调用最大迭代次数（request_limit=6）
search_quota_daily = 30    # 每日搜索次数上限
session_ttl_seconds = 3600  # 会话过期时间（1小时无活动则过期）
history_max_messages = 50   # 会话历史最大消息数（超过则LLM摘要裁剪）

[ai.providers.deepseek]
type = "openai_compatible"
base_url = "https://api.deepseek.com/v1"
model = "deepseek-v4-flash"
api_key_env = "DEEPSEEK_API_KEY"

[reply]
system_prompt_file = "config/system-prompt.txt"
temperature = 0.5
max_tokens = 1500

[rate_limit]
min_request_interval_seconds = 0.5
reply_delay_min_seconds = 0.3
reply_delay_max_seconds = 1.2
max_retries = 3
backoff_base_seconds = 10
circuit_breaker_failures = 5
circuit_breaker_cooldown_seconds = 600
max_hourly_replies = 20
max_daily_replies = 100
source_circuit_breaker_failures = 3

[content_safety]
sensitive_words = []
max_length = 1200     # 回复最大字数（私信可适当放宽）
max_url_count = 3
block_pii = true

[cookie]
cookies_file = "config/bilibili-cookies.txt"
refresh_enabled = true
refresh_token_env = "BILIBILI_REFRESH_TOKEN"
check_interval_minutes = 30
healthcheck_endpoint = "https://api.bilibili.com/x/web-interface/nav"
