[bot]
enabled = true
poll_interval_seconds = 5
run_mode = "daemon"
conservative_mode = true
log_level = "INFO"
request_timeout_seconds = 25
source_failure_cooldown_seconds = 180

[sources.msgfeed]
enabled = true
poll_interval_seconds = 8
page_size = 10

[sources.mention]
enabled = true
page_size = 10

[sources.own_video]
enabled = true
video_page_size = 5
comment_page_size = 10
max_retries = 2
retry_sleep_seconds = 6

[sources.own_dynamic]
enabled = true
dynamic_page_size = 5
comment_page_size = 10

[sources.dm]
enabled = true
poll_interval_seconds = 5
max_reply_per_round = 5
skip_keywords = ["广告", "推广", "加微信"]
whitelist_mids = []

[filters]
skip_self = true
skip_empty = true
skip_pure_emoji = true
min_meaningful_length = 2
blacklist_mids = []
duplicate_window_minutes = 1440

[ai]
primary_provider = "deepseek" # 主 AI Provider（DeepSeek V4 Flash）
timeout_seconds = 25
max_reply_chars = 100
tools_enabled = true           # 启用 LLM Function Calling（视频摘要/转录/联网搜索）
tool_max_iterations = 3       # 工具调用最大迭代次数
search_quota_monthly = 30    # 每月搜索次数上限

[ai.providers.deepseek]
type = "openai_compatible"
base_url = "https://api.deepseek.com/v1"
model = "deepseek-v4-flash"
api_key_env = "DEEPSEEK_API_KEY"

[reply]
system_prompt = """
你是一只「小苏doge」，B站技术区UP主兼评论区常驻选手。

【回复风格】
- 简单闲聊越短越好，能三个字说完就别用五个字
- 评论回复 ≤ 80 字，私信 ≤ 100 字
- 但如果调用了 get_video_content 或 search_web 工具获取了详细内容，回复可以适当延长以完整传达信息，不用死守字数上限
- 视频总结时尽量全面：先说主题，再列要点（每条一行），最后给个简短评价。不要泛泛而谈"这个视频不错"，要有具体内容
- 语气自然、接地气、有梗，不做作
- 技术话题认真聊，玩梗就接梗，被夸就谦虚
- 偶尔用颜文字和拟声词，但别滥用

【格式要求】
- 不要用任何 Markdown 格式（不要 **加粗**、不要 `代码`、不要 ### 标题、不要列表前的 - 符号）
- B站评论区和私信不支持 Markdown，用了会显示乱码符号，看起来很丑
- 视频总结用自然的分段：先一句话说主题，然后用分号或句号分隔要点，最后评价

【楼中楼回复指南】
当你在评论区楼中楼被 @ 时，回复不要只看 @ 你的人说了什么。输入里会有「视频标题」「对话上下文」「被回复的评论」，这些都要参考：
- 视频标题 → 了解话题背景，别聊跑偏
- 对话上下文 → 显示你在回复谁、那个人说了什么，要顺着话题接
- 被回复的评论 → 楼主/上一层说的话，你的回复要在这个语境里
- @ 你的人说的话 → 这是你直接要回应的内容
动作：先快速看一遍视频标题了解主题，再看对话上下文搞清楚讨论到哪了，再看被回复的评论理解语境，最后结合 @ 你的人说的话生成回复。不要孤立地只回最后一句，要让人感觉你读懂了整条链。

【工具使用】
- 用户要求总结视频 / 问「讲了什么」 → 用 get_video_content 查 BV 号对应的视频内容
- 用户问新闻、查资料、问实时信息 → 用 search_web 搜索
- 简单闲聊、打招呼、无信息需求的评论 → 直接回复，不要调工具

【禁区】
- 不说「作为AI」「根据我的训练数据」「我不能确定」
- 不道歉过度，偶尔出错就俏皮带过
- 不评价敏感政治话题，遇到就转移话题
- 不对同一用户重复相似的回复
- 严禁编造信息。不知道就说不知道，没有搜索结果就老实说没找到，不要凭空捏造事实、数据、人名、日期
- 禁止使用 Markdown 格式（**加粗**、`代码`、### 标题、列表前的 - 符号等），B站不支持这些语法，会显示乱码

【不确定时】
- 没搜到结果 → 诚实说没找到，建议用户换个关键词或自己去搜
- 工具失败 → 告知暂时不可用，可以稍后再试
"""
temperature = 0.75
max_tokens = 800
prefix = ""
mention_style = "friendly"

[rate_limit]
min_request_interval_seconds = 0.5
reply_delay_min_seconds = 0.3
reply_delay_max_seconds = 1.2
max_retries = 3
backoff_base_seconds = 10
circuit_breaker_failures = 5
circuit_breaker_cooldown_seconds = 600
max_hourly_replies = 20
max_daily_replies = 100
source_circuit_breaker_failures = 3

[cookie]
cookies_file = "config/bilibili-cookies.txt"
refresh_enabled = true
refresh_token_env = "BILIBILI_REFRESH_TOKEN"
check_interval_minutes = 30
healthcheck_endpoint = "https://api.bilibili.com/x/web-interface/nav"
